<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>DQN HW3-2 監控面板 (Player Mode)</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; background-color: #f8f9fa; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { color: #2c3e50; font-size: 1.8rem; margin-bottom: 10px; }
        #status { font-size: 1.2rem; margin: 15px 0; color: #34495e; font-weight: 600; }
        .controls { background: #edf2f7; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: center; gap: 10px; align-items: center; }
        select, button { padding: 8px 12px; border-radius: 6px; border: 1px solid #cbd5e0; font-size: 14px; }
        button { background-color: #4a5568; color: white; cursor: pointer; transition: 0.2s; border: none; }
        button:hover { background-color: #2d3748; }
        canvas { background-color: #fff; border: 2px solid #e2e8f0; border-radius: 8px; }
        #debug-log { background: #1a202c; color: #68d391; padding: 12px; text-align: left; height: 120px; overflow-y: auto; margin-top: 20px; border-radius: 8px; font-family: 'Consolas', monospace; font-size: 12px; line-height: 1.5; }
        .label-tag { font-size: 12px; padding: 2px 8px; border-radius: 4px; background: #ebf8ff; color: #3182ce; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>DQN 訓練即時監控 <span class="label-tag">HW3-2</span></h1>
        
        <div class="controls">
            <span>模式：<strong>Player</strong></span>
            <select id="algoSelect">
                <option value="double">Double DQN</option>
                <option value="dueling">Dueling DQN</option>
                <option value="naive">Naive DQN</option>
            </select>
            <button onclick="connectAndTrain()">開始訓練</button>
        </div>

        <div id="status">準備就緒，請選擇演算法並開始</div>
        
        <canvas id="gridCanvas" width="400" height="400"></canvas>
        
        <div id="debug-log"></div>
    </div>

    <script>
        const canvas = document.getElementById('gridCanvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');
        const logDiv = document.getElementById('debug-log');
        let ws = null;

        function log(msg) {
            const time = new Date().toLocaleTimeString();
            logDiv.innerHTML += `[${time}] > ${msg}<br>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function connectAndTrain() {
            if (ws) {
                ws.close();
                log("正在重啟連線...");
            }

            const algo = document.getElementById('algoSelect').value;
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws/train`;
            
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                log(`連線成功！正在啟動 Player 模式 - ${algo.toUpperCase()}`);
                statusDiv.innerText = "正在初始化環境...";
                ws.send(JSON.stringify({ mode: "player", algo: algo }));
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    statusDiv.innerText = `Episode: ${data.episode}, Reward: ${data.reward}`;
                    draw(data);
                } catch (e) { console.error(e); }
            };

            ws.onerror = () => {
                log("連線錯誤！請確保 Codespaces Port 8000 已設為 Public。");
            };
        }

        function draw(data) {
            const S = 100;
            ctx.clearRect(0, 0, 400, 400);

            // 1. 畫背景網格
            ctx.strokeStyle = "#edf2f7";
            for(let i=0; i<=4; i++) {
                ctx.beginPath(); ctx.moveTo(i*S, 0); ctx.lineTo(i*S, 400); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i*S); ctx.lineTo(400, i*S); ctx.stroke();
            }

            const getPos = (p) => Array.isArray(p) ? p : [0, 0];

            // 2. 畫目標 Goal
            if (data.goal) {
                const p = getPos(data.goal);
                ctx.fillStyle = "#48bb78";
                ctx.fillRect(p[1]*S+15, p[0]*S+15, 70, 70);
            }

            // 3. 畫牆壁 Wall
            if (data.walls) {
                data.walls.forEach(w => {
                    const p = getPos(w);
                    ctx.fillStyle = "#718096";
                    ctx.fillRect(p[1]*S+5, p[0]*S+5, 90, 90);
                });
            }

            // 4. 畫陷阱 Pit
            if (data.pits) {
                data.pits.forEach(pit => {
                    const p = getPos(pit);
                    ctx.fillStyle = "#f56565";
                    ctx.beginPath(); ctx.arc(p[1]*S+50, p[0]*S+50, 35, 0, Math.PI*2); ctx.fill();
                });
            }

            // 5. 畫玩家 Player
            if (data.player) {
                const p = getPos(data.player);
                ctx.fillStyle = "#4299e1";
                ctx.fillRect(p[1]*S+25, p[0]*S+25, 50, 50);
            }
        }
    </script>
</body>
</html>
